<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Rotasi Tempat Duduk</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #1a4a75;
            margin-bottom: 10px;
            text-align: center;
        }

        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: bold;
            color: #555;
        }

        select {
            padding: 8px 16px;
            font-size: 16px;
            border: 2px solid #1a4a75;
            border-radius: 6px;
            background-color: white;
            color: #1a4a75;
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }

        .classroom {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 900px;
            width: 100%;
            box-sizing: border-box;
        }

        .board {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 4px;
            margin-bottom: 40px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .chair {
            position: relative;
            background-color: #e8f4fd;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: help;
        }

        .chair:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
            background-color: #d4ecfc;
        }

        .chair-number {
            font-size: 12px;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 4px;
        }

        .students {
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            min-height: 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            word-break: break-word;
        }

        /* Gaya Pop-up Tooltip */
        .chair .tooltip {
            visibility: hidden;
            width: 220px;
            background-color: #2c3e50;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px 10px;
            position: absolute;
            z-index: 10;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            pointer-events: none;
            line-height: 1.4;
        }

        .chair .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #2c3e50 transparent transparent transparent;
        }

        .chair:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Responsive Mobile View (3 Kolom) */
        @media screen and (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            h2 {
                font-size: 18px;
            }

            .classroom {
                padding: 15px;
            }

            .board {
                margin-bottom: 20px;
                font-size: 12px;
                padding: 8px;
            }

            .grid-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px; 
            }

            .chair {
                padding: 8px 4px;
            }

            .chair-number {
                font-size: 9px;
                margin-bottom: 4px;
            }

            .students {
                font-size: 9px;
                min-height: 45px;
                gap: 2px;
            }

            .chair .tooltip {
                width: 140px;
                font-size: 9px;
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>

    <h2>JADWAL ROTASI TEMPAT DUDUK</h2>
    
    <div class="controls">
        <label for="daySelect">Pilih Tanggal:</label>
        <select id="daySelect" onchange="updateSeating()">
            <option value="senin">Senin, 20 Juli 2026</option>
            <option value="selasa">Selasa, 21 Juli 2026</option>
            <option value="rabu">Rabu, 22 Juli 2026</option>
            <option value="kamis">Kamis, 23 Juli 2026</option>
            <option value="jumat">Jum'at, 24 Juli 2026</option>

    </div>

    <div class="classroom">
        <div class="board">PAPAN TULIS / DEPAN KELAS</div>
        
        <div class="grid-container" id="seatingGrid">

    </div>

            16: { name: "MUHAMMAD FARID S.", npp: "T072377" },

            19: { name: "MUHAMMAD JAZULI L.", npp: "T072380" },

            23: { name: "R. RAISYA F BENTANGK.", npp: "T072384" },
            24: { name: "RASYID NUR ALLAM", npp: "T072385" },
            25: { name: "SEKARINGTYAS HAPSARI P.", npp: "T072386" },

        };

        // Hasil Acak Kursi Baru & Unik (Senin - Jumat)
        const seatingRotations = {
            senin: [
                [9, 24], [5, 20], [17, 3],
                [11, 26], [28, 13], [15, 30],
                [1, 16], [19, 4], [7, 22],

            ],
            selasa: [
                [22, 13], [30, 21], [18, 9],

                [10, 29], [6, 25], [27, 16],
                [4, 11], [17, 8], [12, 3],

            ],
            rabu: [

                [29, 17], [7, 25], [16, 4],
                [24, 12], [2, 20], [11, 28],
                [19, 8], [26, 15], [3, 22],

            ],
            kamis: [

                [27, 22], [5, 30], [14, 9],
                [23, 18], [6, 1], [29, 25],

            ],
            jumat: [
                [19, 10], [3, 23], [15, 6],

                [13, 4], [25, 16], [9, 29],
                [20, 12], [30, 8], [24, 14]
            ]
        };

        function generateGrid() {
            const grid = document.getElementById('seatingGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 15; i++) {
                const chairDiv = document.createElement('div');
                chairDiv.className = 'chair';
                
                chairDiv.innerHTML = `
                    <div class="chair-number">Kursi ${i}</div>
                    <div class="students" id="students-${i}">
                        </div>
                    <div class="tooltip" id="tooltip-${i}">
                        </div>
                `;
                grid.appendChild(chairDiv);
            }
        }

        function updateSeating() {
            const selectedDay = document.getElementById('daySelect').value;
            const currentRotation = seatingRotations[selectedDay];
            
            for (let i = 1; i <= 15; i++) {
                const pair = currentRotation[i - 1];
                const s1Num = pair[0];
                const s2Num = pair[1];
                
                const s1 = studentDatabase[s1Num];
                const s2 = studentDatabase[s2Num];

                // Update nama di kursi
                const nameDisplay = `
                    <span>${s1.name}</span>
                    <span style="color:#bdc3c7; font-size:10px;">&</span>
                    <span>${s2.name}</span>
                `;
                document.getElementById(`students-${i}`).innerHTML = nameDisplay;

                // Update info di pop-up
                const tooltipContent = `
                    <strong>Asal Posisi:</strong><br>
                    Siswa ${s1Num} (${s1.npp})<br>
                    &<br>
                    Siswa ${s2Num} (${s2.npp})
                `;
                document.getElementById(`tooltip-${i}`).innerHTML = tooltipContent;
            }
        }

        // Jalankan sistem saat web dibuka
        generateGrid();
        updateSeating();
    </script>
</body>
</html>
